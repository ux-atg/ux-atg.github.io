<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>V85 Rättning – Prototyper</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background-color: #0B1929;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 2rem;
    }

    h1 {
      color: #ffffff;
      font-size: 1.125rem;
      font-weight: 400;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      opacity: 0.6;
    }

    h2 {
      color: #ffffff;
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 3rem;
    }

    .cards {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 100%;
      max-width: 320px;
    }

    .card {
      display: block;
      text-decoration: none;
      background-color: #ffffff;
      border-radius: 12px;
      padding: 1.5rem 2rem;
      color: #0B1929;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
    }

    .card:active {
      transform: translateY(0);
    }

    .card-label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.5;
      margin-bottom: 0.25rem;
    }

    .card-title {
      font-size: 1.25rem;
      font-weight: 700;
    }

    .card-desc {
      font-size: 0.875rem;
      opacity: 0.6;
      margin-top: 0.25rem;
    }
  </style>
</head>
<body>
  <h1>V85 Rättning</h1>
  <h2>Välj prototyp</h2>

  <div class="cards">
    <a class="card" href="/variantA/">
      <div class="card-label">Variant A</div>
      <div class="card-title">Basic</div>
      <div class="card-desc">Grundläggande rättningsvy</div>
    </a>

    <a class="card" href="/variantB/">
      <div class="card-label">Variant B</div>
      <div class="card-title">Video</div>
      <div class="card-desc">Rättningsvy med video</div>
    </a>

    <a class="card" href="/variantC/">
      <div class="card-label">Variant C</div>
      <div class="card-title">Lotto</div>
      <div class="card-desc">Rättningsvy med lotto-hjul</div>
    </a>
  </div>
</body>
</html>
